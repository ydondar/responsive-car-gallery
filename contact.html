<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <title>Contact</title>
</head>

<body>

  <div id="header">

    <a class="logo" href="index.html">
      <img src="logo.png" width="165" height="100">
    </a>

    <ul id="nav">
      <li><a href="index.html" class="common-link">Home</a></li>
      <li><a href="about.html" class="common-link">About Us</a></li>

      <li><a href="contact.html" class="common-link">Contact</a></li>

    <div class="search-container">
      <input type="text" id="searchBox" />
      <button id="searchButton">Search</button>
    </div>
  </div>
  
  <main class="page-content">
  <div id="contact">

    <h1>Contact</h1>

    <label for="inputFirstName">First Name</label>
    <input type="text" id="inputFirstName">

    <label for="inputLastName">Last Name</label>
    <input type="text" id="inputLastName">

    <label for="email">E-Mail</label>
    <input type="email" id="email"><br>

    <label for="messageText">Message</label>
    <textarea id="messageText" rows="10" cols="35"></textarea>

    <button id="sendButton">Send</button>

    <div id="message"></div>

  </div>

  </main>

  <div id="footer">

    <div class="footer-top">

       <div id="address">
        Address: Istiklal Avenue, Acar Street<br>
        No:2 Beyoglu, 34440 Taksim,<br>
        Istanbul, Turkey
      </div>

      <div id="copyright">
        Copyright © 2025 All Rights Reserved.
      </div>

    </div>

    <div class="footer-bottom">

      <div id="bottom-logo">
        <img src="logo.png" id="logo" width="165" height="100">
      </div>

      <ul id="bottom-links">

        <div id="icons">
          <a href="https://x.com"><img src="x.png" width="32" height="32" alt="X"></a>
          <a href="https://facebook.com"><img src="facebook.png" width="32" height="32" alt="Facebook"></a>
          <a href="https://instagram.com"><img src="instagram.png" width="32" height="32" alt="Instagram"></a>
          <a href="https://whatsapp.com"><img src="whatsapp.png" width="32" height="32" alt="WhatsApp"></a>
        </div>

        <li><a href="index.html" class="common-link">Home</a></li>
        <li><a href="about.html" class="common-link">About Us</a></li>
        <li><a href="references.html" class="common-link">References</a></li>
        <li><a href="contact.html" class="common-link">Contact</a></li>

      </ul>

    </div>

  </div>

  <script src="script.js"></script>
  <script src="contact.js"></script>

</body>

</html>
